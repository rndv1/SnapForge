name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-cli:
    name: Publish CLI (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar
          - os: macos-latest
            rid: osx-x64
            archive: tar
          - os: macos-latest
            rid: osx-arm64
            archive: tar

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: >
          dotnet publish src/SnapForge.Cli/SnapForge.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          --output artifacts/publish/snapforge-cli-${{ matrix.rid }}

      - name: Normalize executable name
        shell: pwsh
        run: |
          $publishDir = "artifacts/publish/snapforge-cli-${{ matrix.rid }}"
          $windowsExe = Join-Path $publishDir "SnapForge.Cli.exe"
          $unixExe = Join-Path $publishDir "SnapForge.Cli"

          if (Test-Path $windowsExe) {
            Rename-Item -Path $windowsExe -NewName "snapforge-cli.exe" -Force
          }

          if (Test-Path $unixExe) {
            Rename-Item -Path $unixExe -NewName "snapforge-cli" -Force
          }

      - name: Archive Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release | Out-Null
          Compress-Archive `
            -Path artifacts/publish/snapforge-cli-${{ matrix.rid }}/* `
            -DestinationPath artifacts/release/snapforge-cli-${{ matrix.rid }}.zip `
            -Force

      - name: Archive Unix binary
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          mkdir -p artifacts/release
          tar -czf artifacts/release/snapforge-cli-${{ matrix.rid }}.tar.gz -C artifacts/publish snapforge-cli-${{ matrix.rid }}

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: snapforge-cli-${{ matrix.rid }}
          path: artifacts/release/*
          if-no-files-found: error

  publish-web-app:
    name: Publish Web App (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar
          - os: macos-latest
            rid: osx-x64
            archive: tar
          - os: macos-latest
            rid: osx-arm64
            archive: tar

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: >
          dotnet publish src/SnapForge.Web/SnapForge.Web.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          --output artifacts/publish/snapforge-${{ matrix.rid }}

      - name: Normalize executable name
        shell: pwsh
        run: |
          $publishDir = "artifacts/publish/snapforge-${{ matrix.rid }}"
          $windowsExe = Join-Path $publishDir "SnapForge.Web.exe"
          $unixExe = Join-Path $publishDir "SnapForge.Web"

          if (Test-Path $windowsExe) {
            Rename-Item -Path $windowsExe -NewName "snapforge.exe" -Force
          }

          if (Test-Path $unixExe) {
            Rename-Item -Path $unixExe -NewName "snapforge" -Force
          }

      - name: Archive Windows app
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release | Out-Null
          Compress-Archive `
            -Path artifacts/publish/snapforge-${{ matrix.rid }}/* `
            -DestinationPath artifacts/release/snapforge-${{ matrix.rid }}.zip `
            -Force

      - name: Archive Unix app
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          mkdir -p artifacts/release
          tar -czf artifacts/release/snapforge-${{ matrix.rid }}.tar.gz -C artifacts/publish snapforge-${{ matrix.rid }}

      - name: Upload app asset
        uses: actions/upload-artifact@v7
        with:
          name: snapforge-${{ matrix.rid }}
          path: artifacts/release/*
          if-no-files-found: error

  pack-tool:
    name: Pack .NET tool
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Pack
        shell: bash
        run: |
          package_version="${GITHUB_REF_NAME#v}"

          if [[ ! "$package_version" =~ ^[0-9]+(\.[0-9]+){1,3}([-.][0-9A-Za-z.-]+)?$ ]]; then
            package_version="0.1.0-local"
          fi

          dotnet pack src/SnapForge.Cli/SnapForge.Cli.csproj \
            --configuration Release \
            -p:Version="$package_version" \
            --output artifacts/packages

      - name: Upload .NET tool package
        uses: actions/upload-artifact@v7
        with:
          name: snapforge-dotnet-tool
          path: artifacts/packages/*.nupkg
          if-no-files-found: error

  create-release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - publish-cli
      - publish-web-app
      - pack-tool
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          path: artifacts/release-assets

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts/release-assets

          find . -type f ! -name 'SHA256SUMS.txt' | sort | while read -r file; do
            sha256sum "$file" | sed 's#  ./[^/]*/#  #'
          done > SHA256SUMS.txt

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t release_files < <(find artifacts/release-assets -type f | sort)

          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "${release_files[@]}"
